name: APK debug (test)
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }
      - uses: android-actions/setup-android@v3
      - run: yes | sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools" || true
      - run: npm install
      - run: npx cap add android
      - run: npx capacitor-assets generate --android || true
      - run: npx cap sync android
      - name: Compiler l'APK debug
        run: cd android && chmod +x ./gradlew && ./gradlew assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: SmartIDS-APK-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
